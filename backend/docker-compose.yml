version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: linguaverse_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: linguaverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - linguaverse_net

  redis:
    image: redis:7-alpine
    container_name: linguaverse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - linguaverse_net

volumes:
  postgres_data:
  redis_data:

networks:
  linguaverse_net:
    driver: bridge
